<html>
	<head>
		<style>
			@font-face {
				font-family: 'brawlstarsmenufont';
				src: url('/static/fonts/lilitaone-regular-webfont.ttf') format('truetype');
				font-weight: normal;
				font-style: normal;
			}
			canvas {
				background-color: transparent !important;
			}
		</style>
		<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
		<script>
			const staticFileEndpoint = `/static/`;
			const fps = 120;
			const textOutlineWidth = 15;
			const middleOfCanvasXY = 500;
			const textYDefaultValue = 750;
			
			let init_state = false;
			let stage = null;
			
			function createRankedIconBitmap (rank , x=500, y=0, opacity=0){
				let myBitmap = new createjs.Bitmap(staticFileEndpoint + "ranked_images/" + rank + ".png");
				myBitmap.alpha = opacity;
				myBitmap.x = x;
				myBitmap.y = y;
				myBitmap.scale = 1.5;
				
				myBitmap.image.onload = function() {
					myBitmap.regX = myBitmap.image.width / 2;
					myBitmap.regY = myBitmap.image.height / 2;
				};
				
				stage.addChild(myBitmap);

				
				return myBitmap;
			}
			
			function rankedIconAnimation(bitmap, textFill , textOutline, alphaFadeInTime=1500, visibleWaitTime=2000,alphaFadeOutTime=1000, bounceToY=500, airTime=1000, easePower=2){
				createjs.Tween.get(bitmap).to({ y: bounceToY }, airTime, createjs.Ease.quadIn);
				createjs.Tween.get(bitmap)
					.to({ alpha: 1 }, alphaFadeInTime, createjs.Ease.getPowIn(easePower))
					.wait(visibleWaitTime + Math.abs((airTime - alphaFadeInTime)))                                    // Waits 1 second after finishing
					.to({ alpha: 0 }, alphaFadeOutTime, createjs.Ease.getPowOut(easePower)) // Fades out to 0 (Takes 1 second)
					.call(function() {
						stage.removeChild(bitmap);               // Deletes it from the stage completely
					});
				createjs.Tween.get(textFill)
				.to({ alpha: 1 }, alphaFadeInTime, createjs.Ease.getPowIn(easePower))
				.wait(visibleWaitTime + Math.abs((airTime - alphaFadeInTime)))                                    // Waits 1 second after finishing
				.to({ alpha: 0 }, alphaFadeOutTime, createjs.Ease.getPowOut(easePower)) // Fades out to 0 (Takes 1 second)
				.call(function() {
					stage.removeChild(textFill);               // Deletes it from the stage completely
					});
					
				createjs.Tween.get(textOutline)
				.to({ alpha: 1 }, alphaFadeInTime, createjs.Ease.getPowIn(easePower))
				.wait(visibleWaitTime + Math.abs((airTime - alphaFadeInTime)))                                    // Waits 1 second after finishing
				.to({ alpha: 0 }, alphaFadeOutTime, createjs.Ease.getPowOut(easePower)) // Fades out to 0 (Takes 1 second)
				.call(function() {
					stage.removeChild(textOutline);               // Deletes it from the stage completely
					});
			}
			
			function init() {
				stage = new createjs.Stage("canvas");

				stage.autoClear = true; 

				// circle.graphics.beginFill("Crimson").drawCircle(0, 0, 50);
				// circle.x = 100;
				// circle.y = 100;
				// stage.addChild(circle);
				// createjs.Tween.get(circle, {loop: true})
				//   .to({x: 400}, 1000, createjs.Ease.getPowInOut(4))
				//   .to({alpha: 0, y: 75}, 500, createjs.Ease.getPowInOut(2))
				//   .to({alpha: 0, y: 125}, 100)
				//   .to({alpha: 1, y: 100}, 500, createjs.Ease.getPowInOut(2))
				//   .to({x: 100}, 800, createjs.Ease.getPowInOut(2));
				createjs.Ticker.setFPS(fps);
				createjs.Ticker.addEventListener("tick", stage);
				document.fonts.load("150px brawlstarsmenufont");
				console.log("Init complete");
				init_state = true;
				
				hookToEventSource();
			}
			
			function hookToEventSource(){
				const eventSource = new EventSource(`/follower_stream`);
				
				eventSource.onmessage = async (event) => {
				if(init_state == true) {
					let infoObject = JSON.parse(event.data)
					
					let rankText = await fetch(staticFileEndpoint + 'ranked_text/' + infoObject.rank + '.txt')
						.then(response => response.text())
						.then(text =>{
							return text.replaceAll("[USERNAME]", infoObject.username);
						});
						
					let textFill = new createjs.Text(rankText, "100px brawlstarsmenufont", "#FFFFFF");
					textFill.x = middleOfCanvasXY;
					textFill.y = textYDefaultValue;
					textFill.textAlign = "center";
					textFill.alpha = 0;
					textFill.maxWidth = stage.canvas.width;
					
					let textOutline = new createjs.Text(rankText, "100px brawlstarsmenufont", "#000000");
					textOutline.outline = textOutlineWidth;
					textOutline.x = textFill.x;
					textOutline.y = textFill.y;
					textOutline.textAlign = "center";
					textOutline.alpha = 0;
					textOutline.maxWidth = stage.canvas.width;
					
					stage.addChild(textOutline);
					stage.addChild(textFill);
					
					rankedIconAnimation(createRankedIconBitmap(infoObject.rank), textFill, textOutline);
				}
			};
			}
			
			
			
			window.onbeforeunload = () => eventSource.close();
		</script>
	</head>
	<body onload="init();">
		<canvas id="canvas" width="1000" height="1000"></canvas>
	</body>
</html>
