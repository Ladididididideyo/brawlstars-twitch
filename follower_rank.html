<html>
	<head>
		<style>
			@font-face {
				font-family: 'brawlstarsmenufont';

		</style>
		<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
		<script>
			const port = 1234
			const staticFileEndpoint = "localhost:${port}/static/"
			const eventSource = new EventSource(`http://localhost:${port}/stream`);
			const fps = 120
			let init = false;
			let stage = null;
			function createRankedIconBitmap (rank , x=500, y=0, opacity=0){
				var myBitmap = new createjs.Bitmap(staticFileEndpoint + "ranked_images/" + rank + ".png");
				myBitmap.alpha = opacity;
				myBitmap.x = x;
				myBitmap.y = y;
				
				stage.addChild(myBitmap);

				
				return myBitmap;
			}
			function rankedIconAnimation(bitmap, textOutline, textFill, alphaFadeInTime=500, visibleWaitTime=1000,alphaFadeOutTime=500, bounceToY=500, airTime=750){
				createjs.Tween.get(bitmap).to({ y: bounceToY }, airTime, createjs.Ease.bounceIn);
				createjs.Tween.get(bitmap)
					.to({ alpha: 1 }, alphaFadeInTime, createjs.Ease.linear)
					.wait(visibleWaitTime + Math.abs((airTime - alphaFadeInTime)))                                    // Waits 1 second after finishing
					.to({ alpha: 0 }, alphaFadeOutTime, createjs.Ease.linear) // Fades out to 0 (Takes 1 second)
					.call(function() {
						stage.removeChild(bitmap);               // Deletes it from the stage completely
					});
			}

				stage = new createjs.Stage("canvas");

				stage.autoClear = true;

				//   .to({alpha: 0, y: 125}, 100)
				//   .to({alpha: 1, y: 100}, 500, createjs.Ease.getPowInOut(2))
				//   .to({x: 100}, 800, createjs.Ease.getPowInOut(2));
				createjs.Ticker.setFPS(fps);
				createjs.Ticker.addEventListener("tick", stage);
				document.fonts.load("150px brawlstarsmenufont");
				init = true;
			}
			eventSource.onmessage = (event) => {
				if(init == true) {
